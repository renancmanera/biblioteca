<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
    <script src="header.js"></script>
</head>
<body>
    <nav id="sidebar">
        <div id="sidebar_content">
            <div id="user">
                <img src="avatar.avif" id="user_avatar">
                <style>
                    #user_avatar {
                        width: 70px; /* Ajuste este valor conforme necessário */
                        height: 70px; /* Certifique-se de que a altura e a largura sejam iguais */
                        border-radius: 50%; /* Torna a imagem redonda */
                        object-fit: cover; /* Garante que a imagem se ajuste bem dentro do contêiner */
                        margin-right: 20px;
                    }
                </style>
                <p id="user_infos">
                    <span class="item-description">
                        Funcionário
                    </span>
                </p>
            </div>
    
            <ul id="side_items">
                <li class="side-item active">
                    <a href="#">
                        <i class="fa-solid fa-chart-line"></i>
                        <span class="manter-livros">
                            Manter livros
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="cadastro.html">
                        <i class="fa-solid fa-user"></i>
                        <span class="item-description">
                            Cadastrar usuário
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-bell"></i>
                        <span class="item-description">
                            Editar usuários
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-box"></i>
                        <span class="item-description">
                            Registrar empréstimo
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-image"></i>
                        <span class="item-description">
                            Editar empréstimos
                        </span>
                    </a>
                </li>
    
                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-gear"></i>
                        <span class="item-description">
                            Eventos
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-gear"></i>
                        <span class="item-description">
                            Multas
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-gear"></i>
                        <span class="item-description">
                            Relatório de estoque
                        </span>
                    </a>
                </li>
            </ul>
    
            <div id="logout">
                <a href="login.html"> <button id="logout_btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span class="item-description"> 
                        Logout 
                    </span>
                </button> </a>
            </div>
           
        </div>
    </nav>
    
    <main>
            <div class="card">
                <h1 class="gradient-text">Adicionar livros</h1>
                <div class="output">
                    
                    <div class="form-group" id="group-book-name">
                        <label for="book-name" id="label-book-name">Nome do Livro:</label>
                        <input type="text" id="book-name" name="book-name" required>
                    </div>
                    <div class="form-group" id="group-author-name">
                        <label for="author-name" id="label-author-name">Autor:</label>
                        <input type="text" id="author-name" name="author-name" required>
                    </div>
                    <div class="form-group" id="group-publication-date">
                        <label for="publication-date" id="label-publication-date">Data de Publicação:</label>
                        <input type="date" id="publication-date" name="publication-date" required>
                    </div>
                    
                </div>
                <div class="input-area">
             
                    <button onclick="verificarEditar()" id="enviarButton">Cadastrar</button>
                </div>

                <p id="voltar"><a href="header.html">Voltar</p></a>

            </div> 
        </main>
</body>
</html>
